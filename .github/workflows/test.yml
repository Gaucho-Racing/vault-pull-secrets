name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  env-export:
    name: Env Export
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      EXPECTED_TEST_VARIABLE: my-awesome-test-variable
    steps:
      - uses: actions/checkout@v5

      - id: vault
        uses: ./
        with:
          secrets: vault-pull-secrets.test_variable

      - name: Verify test variable
        env:
          OUTPUT_TEST_VARIABLE: ${{ fromJSON(steps.vault.outputs.secrets_json).TEST_VARIABLE }}
        run: |
          if [ "${TEST_VARIABLE:-}" != "$EXPECTED_TEST_VARIABLE" ]; then
            echo "TEST_VARIABLE did not match the expected canary value." >&2
            exit 1
          fi
          if [ "${OUTPUT_TEST_VARIABLE:-}" != "$EXPECTED_TEST_VARIABLE" ]; then
            echo "secrets_json did not include the expected canary value." >&2
            exit 1
          fi
          echo "TEST_VARIABLE matched the expected canary value."

  action-input:
    name: Action Input
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - id: vault
        uses: ./
        with:
          secrets: vault-pull-secrets.test_variable

      - name: Verify output as action input
        uses: ./.github/actions/assert-input
        with:
          actual: ${{ fromJSON(steps.vault.outputs.secrets_json).TEST_VARIABLE }}
          expected: my-awesome-test-variable

  explicit-selector-required:
    name: Explicit Selector Required
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - id: wildcard
        name: Request wildcard selector
        continue-on-error: true
        uses: ./
        with:
          secrets: vault-pull-secrets.*

      - name: Verify wildcard selector was rejected
        run: |
          if [ "${{ steps.wildcard.outcome }}" != "failure" ]; then
            echo "Wildcard selector request should have failed." >&2
            exit 1
          fi
          echo "Wildcard selector request was rejected."

  all-passing:
    name: All Passing
    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    needs:
      - env-export
      - action-input
      - explicit-selector-required
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Verify all checks passed
        run: |
          if [ "${{ needs.env-export.result }}" != "success" ]; then
            echo "Env Export did not pass." >&2
            exit 1
          fi
          if [ "${{ needs.action-input.result }}" != "success" ]; then
            echo "Action Input did not pass." >&2
            exit 1
          fi
          if [ "${{ needs.explicit-selector-required.result }}" != "success" ]; then
            echo "Explicit Selector Required did not pass." >&2
            exit 1
          fi
          echo "All checks passed."
