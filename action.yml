name: Pull Vault Secrets
description: Export Vault app secrets into the current GitHub Actions job environment.
branding:
  icon: unlock
  color: black
inputs:
  vault_url:
    description: Base URL for Vault.
    required: false
    default: https://vault.gauchoracing.com
  secrets:
    description: Newline or comma separated Vault app secret selectors to export.
    required: true
  audience:
    description: Expected OIDC audience configured by Vault.
    required: false
    default: gaucho-racing-vault
outputs:
  secrets_json:
    description: JSON object of exported environment variable names to secret values.
    value: ${{ steps.pull-secrets.outputs.secrets_json }}
runs:
  using: composite
  steps:
    - id: pull-secrets
      shell: bash
      env:
        VAULT_URL: ${{ inputs.vault_url }}
        VAULT_SECRETS: ${{ inputs.secrets }}
        VAULT_AUDIENCE: ${{ inputs.audience }}
      run: ${{ github.action_path }}/pull-secrets.sh
